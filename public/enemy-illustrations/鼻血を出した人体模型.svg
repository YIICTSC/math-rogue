<svg width="384" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 足 -->
  <rect x="50" y="92" width="8" height="20" fill="#eeeeee"/>
  <rect x="70" y="92" width="8" height="20" fill="#eeeeee"/>
  <!-- 膝関節 -->
  <rect x="50" y="88" width="8" height="4" fill="#cc0000"/>
  <rect x="70" y="88" width="8" height="4" fill="#cc0000"/>

  <!-- 体（胴体） -->
  <rect x="46" y="60" width="36" height="28" fill="#dddddd"/>
  <!-- 肩関節 -->
  <rect x="44" y="60" width="4" height="8" fill="#cc0000"/>
  <rect x="78" y="60" width="4" height="8" fill="#cc0000"/>

  <!-- 腕 -->
  <rect x="36" y="62" width="8" height="16" fill="#eeeeee"/>
  <rect x="84" y="62" width="8" height="16" fill="#eeeeee"/>
  <!-- 肘関節 -->
  <rect x="36" y="72" width="8" height="4" fill="#cc0000"/>
  <rect x="84" y="72" width="8" height="4" fill="#cc0000"/>

  <!-- 頭 -->
  <rect x="50" y="36" width="28" height="24" fill="#ffd8b0"/>
  <!-- 顎関節 -->
  <rect x="50" y="56" width="28" height="4" fill="#cc0000"/>

  <!-- 髪（ダークグレー） -->
  <rect x="50" y="32" width="28" height="8" fill="#333333"/>

  <!-- 目 -->
  <rect x="56" y="44" width="4" height="4" fill="#111111"/>
  <rect x="68" y="44" width="4" height="4" fill="#111111"/>

  <!-- 鼻血 -->
  <rect x="64" y="52" width="4" height="6" fill="#cc0000"/>
  <rect x="62" y="54" width="2" height="4" fill="#cc0000"/>
  <rect x="66" y="54" width="2" height="4" fill="#cc0000"/>

</svg>
