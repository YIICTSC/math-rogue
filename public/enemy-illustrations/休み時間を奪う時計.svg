  <!-- 時計本体（ドット円風） -->
  <rect x="80" y="48" width="96" height="16" fill="#444"/>
  <rect x="64" y="64" width="128" height="96" fill="#2b2b2b"/>
  <rect x="80" y="160" width="96" height="16" fill="#444"/>

