  <rect x="20" y="36" width="88" height="4" fill="#6f859d"/>
  <rect x="28" y="36" width="4" height="60" fill="#5e738a"/>
  <rect x="96" y="36" width="4" height="60" fill="#5e738a"/>

  <!-- 逆さ影の頭 -->
