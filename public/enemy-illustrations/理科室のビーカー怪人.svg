<svg width="384" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- ビーカー本体 -->
  <rect x="54" y="48" width="20" height="40" fill="#bbbbbb"/>

  <!-- 液体 -->
  <rect x="56" y="56" width="16" height="20" fill="#33ccff"/>
  <rect x="56" y="56" width="16" height="2" fill="#ff4444"/> <!-- 赤目っぽく -->
  <rect x="66" y="56" width="2" height="2" fill="#ff0000"/> <!-- 目アクセント -->

  <!-- 口的表現（液体の境目でギザギザ） -->
  <rect x="58" y="72" width="12" height="2" fill="#660000"/>
  <rect x="58" y="72" width="2" height="2" fill="#ff5555"/>
  <rect x="64" y="72" width="2" height="2" fill="#ff5555"/>
  <rect x="70" y="72" width="2" height="2" fill="#ff5555"/>

  <!-- ビーカーのフチ -->
  <rect x="54" y="44" width="20" height="4" fill="#888888"/>

  <!-- 下の浮遊感 -->
  <rect x="54" y="88" width="20" height="2" fill="#111111" opacity="0.3"/>

</svg>
