<svg width="384" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 本体（怪物の体、偏差値ボード風） -->
  <rect x="44" y="40" width="40" height="48" fill="#eeeeee"/>

  <!-- 破れ・裂け目 -->
  <rect x="44" y="40" width="6" height="8" fill="#cccccc"/>
  <rect x="78" y="40" width="6" height="8" fill="#cccccc"/>
  <rect x="56" y="70" width="16" height="4" fill="#cccccc"/>

  <!-- 目（赤く威圧） -->
  <rect x="52" y="50" width="6" height="4" fill="#ff2244"/>
  <rect x="70" y="50" width="6" height="4" fill="#aa00ff"/>

  <!-- 口（数字ギザギザ） -->
  <rect x="50" y="74" width="28" height="4" fill="#660000"/>
  <rect x="50" y="74" width="4" height="2" fill="#ff5555"/>
  <rect x="58" y="74" width="4" height="2" fill="#ff5555"/>
  <rect x="66" y="74" width="4" height="2" fill="#ff5555"/>
  <rect x="74" y="74" width="4" height="2" fill="#ff5555"/>

  <!-- 数字模様（偏差値感） -->
  <rect x="50" y="60" width="4" height="4" fill="#000000"/>
  <rect x="62" y="60" width="4" height="4" fill="#000000"/>
  <rect x="54" y="66" width="4" height="4" fill="#000000"/>
  <rect x="66" y="66" width="4" height="4" fill="#000000"/>

  <!-- 浮遊感・影 -->
  <rect x="48" y="92" width="32" height="2" fill="#111111" opacity="0.5"/>

</svg>
