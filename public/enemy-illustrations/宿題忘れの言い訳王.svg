<svg width="384" height="256" viewBox="0 0 384 256"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 机 -->
  <rect x="128" y="160" width="128" height="32" fill="#8b5a2b"/>

  <!-- 椅子 -->
  <rect x="144" y="192" width="32" height="16" fill="#664422"/>
  <rect x="208" y="192" width="32" height="16" fill="#664422"/>

  <!-- 体 -->
  <rect x="160" y="128" width="32" height="32" fill="#3366cc"/>
  <!-- 顔 -->
  <rect x="168" y="136" width="16" height="16" fill="#ffcc99"/>
  <!-- 目 -->
  <rect x="172" y="140" width="4" height="4" fill="#000000"/>
  <rect x="180" y="140" width="4" height="4" fill="#000000"/>
  <!-- 口（にやり） -->
  <rect x="172" y="148" width="8" height="4" fill="#cc0000"/>

  <!-- 空のノート -->
  <rect x="144" y="160" width="16" height="16" fill="#ffffff"/>
  <rect x="168" y="160" width="16" height="16" fill="#ffffff"/>

  <!-- 鉛筆 -->
  <rect x="192" y="160" width="8" height="16" fill="#ffcc00"/>
  <rect x="192" y="160" width="8" height="4" fill="#000000"/> <!-- 芯先 -->

  <!-- 言い訳のひらめき（小さな光の粒） -->
  <rect x="184" y="112" width="4" height="4" fill="#ffff00"/>
  <rect x="192" y="104" width="4" height="4" fill="#ffff00"/>
  <rect x="200" y="112" width="4" height="4" fill="#ffff00"/>

</svg>

