<svg width="384" height="256" viewBox="0 0 384 256"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 影 -->
  <rect x="176" y="224" width="32" height="8" fill="#1a2240" opacity="0.5"/>

  <!-- 頭 -->
  <rect x="176" y="64" width="32" height="32" fill="#ffffff"/>
  <!-- 髪 -->
  <rect x="176" y="56" width="32" height="8" fill="#000000"/>
  <rect x="176" y="96" width="32" height="8" fill="#000000"/>

  <!-- 目 -->
  <rect x="184" y="72" width="4" height="4" fill="#cc0000"/>
  <rect x="204" y="72" width="4" height="4" fill="#cc0000"/>

  <!-- 口 -->
  <rect x="188" y="88" width="8" height="4" fill="#cc0000"/>

  <!-- 体（着物風） -->
  <rect x="168" y="96" width="48" height="80" fill="#990033"/>
  <rect x="168" y="96" width="16" height="80" fill="#cc0033"/> <!-- 袖のアクセント -->
  <rect x="200" y="96" width="16" height="80" fill="#cc0033"/> <!-- 袖のアクセント -->

  <!-- 足（裾から少し出る） -->
  <rect x="176" y="176" width="8" height="16" fill="#000000"/>
  <rect x="200" y="176" width="8" height="16" fill="#000000"/>

</svg>
