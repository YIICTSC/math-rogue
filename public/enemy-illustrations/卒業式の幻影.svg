  <rect x="176" y="80" width="32" height="48" fill="#aa99ff"/>
  <rect x="168" y="88" width="8" height="32" fill="#bbbbff"/>
  <rect x="208" y="88" width="8" height="32" fill="#bbbbff"/>

  <!-- 顔 -->
  <rect x="184" y="92" width="24" height="16" fill="#ffe0c0"/>

  <!-- 目（赤く光る） -->
  <rect x="188" y="96" width="4" height="4" fill="#ff4444"/>
  <rect x="200" y="96" width="4" height="4" fill="#ff4444"/>

  <!-- 卒業証書（小さく漂う） -->
  <rect x="160" y="64" width="12" height="4" fill="#ffffcc"/>
  <rect x="212" y="60" width="12" height="4" fill="#ffffcc"/>

  <!-- 浮遊感を出すふわふわブロック -->
  <rect x="172" y="64" width="4" height="4" fill="#ccccff"/>
  <rect x="204" y="72" width="4" height="4" fill="#ccccff"/>
  <rect x="188" y="136" width="8" height="8" fill="#bbbbff"/>

</svg>
