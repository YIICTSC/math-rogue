<svg width="384" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 足 -->
  <rect x="48" y="92" width="12" height="20" fill="#222222"/>
  <rect x="68" y="92" width="12" height="20" fill="#222222"/>

  <!-- 体（放送機器風の装甲） -->
  <rect x="40" y="60" width="48" height="36" fill="#336699"/>
  <rect x="36" y="64" width="56" height="8" fill="#224466"/> <!-- 腕の影 -->

  <!-- 頭 -->
  <rect x="44" y="28" width="40" height="32" fill="#dddddd"/>
  <!-- 頭上スピーカー -->
  <rect x="48" y="20" width="32" height="8" fill="#888888"/>

  <!-- 目（赤く光る） -->
  <rect x="54" y="36" width="8" height="4" fill="#ff0000"/>
  <rect x="66" y="36" width="8" height="4" fill="#ff00ff"/>

  <!-- 口（スピーカー状の線） -->
  <rect x="60" y="50" width="12" height="2" fill="#660000"/>
  <rect x="60" y="50" width="2" height="2" fill="#990000"/>
  <rect x="66" y="50" width="2" height="2" fill="#990000"/>
  <rect x="70" y="50" width="2" height="2" fill="#990000"/>
  <rect x="74" y="50" width="2" height="2" fill="#990000"/>

  <!-- ケーブル風アクセント（右腕から） -->
  <rect x="84" y="64" width="4" height="12" fill="#333333"/>
  <rect x="86" y="64" width="2" height="2" fill="#ffdd33"/>

  <!-- 浮遊感・影 -->
  <rect x="44" y="92" width="36" height="2" fill="#111111" opacity="0.3"/>

</svg>
