<svg width="384" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 足 -->
  <rect x="48" y="92" width="12" height="20" fill="#222222"/>
  <rect x="68" y="92" width="12" height="20" fill="#222222"/>

  <!-- 体（ジャージ・腕組み） -->
  <rect x="40" y="60" width="48" height="36" fill="#223366"/>
  <rect x="36" y="64" width="56" height="8" fill="#112244"/> <!-- 腕組みライン -->

  <!-- 襟部分 -->
  <rect x="36" y="60" width="12" height="16" fill="#223366"/>
  <rect x="80" y="60" width="12" height="16" fill="#223366"/>

  <!-- 頭 -->
  <rect x="44" y="28" width="40" height="32" fill="#ffd8b0"/>

  <!-- 髪（鋭く跳ねた黒髪） -->
  <rect x="44" y="24" width="40" height="8" fill="#111111"/>
  <rect x="46" y="20" width="36" height="4" fill="#333333"/> <!-- ハイライト -->

  <!-- 目（鋭く睨む） -->
  <rect x="54" y="36" width="8" height="2" fill="#ff0000"/>
  <rect x="66" y="36" width="8" height="2" fill="#ff0000"/>

  <!-- 口（厳しい線） -->
  <rect x="60" y="50" width="12" height="2" fill="#660000"/>

  <!-- バット（右手に持たせる） -->
  <rect x="88" y="64" width="4" height="28" fill="#885522"/> <!-- バット本体 -->
  <rect x="88" y="64" width="4" height="4" fill="#bbbbbb"/> <!-- バット先端 -->

</svg>
