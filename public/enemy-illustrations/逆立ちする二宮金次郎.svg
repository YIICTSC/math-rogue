<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 台座 -->
  <rect x="44" y="88" width="40" height="16" fill="#bfc7d1"/>

  <!-- 逆立ちした頭 -->
  <rect x="56" y="72" width="16" height="12" fill="#d9d9d9"/>

  <!-- 目（発光） -->
  <rect x="60" y="76" width="3" height="3" fill="#9ff0ff"/>
  <rect x="65" y="76" width="3" height="3" fill="#9ff0ff"/>

  <!-- 胴体（逆さ） -->
  <rect x="60" y="52" width="8" height="20" fill="#e5e5e5"/>

  <!-- 腕（本を持つ） -->
  <rect x="52" y="56" width="8" height="6" fill="#d0d8e5"/>
  <rect x="68" y="56" width="8" height="6" fill="#d0d8e5"/>

  <!-- 本 -->
  <rect x="54" y="52" width="20" height="6" fill="#8aa0b8"/>

  <!-- 足（上側に） -->
  <rect x="56" y="40" width="6" height="12" fill="#cfd8e3"/>
  <rect x="66" y="40" width="6" height="12" fill="#cfd8e3"/>

</svg>

