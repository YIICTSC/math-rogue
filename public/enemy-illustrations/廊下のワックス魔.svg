<svg width="384" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 足 -->
  <rect x="50" y="88" width="12" height="20" fill="#4444aa"/>
  <rect x="66" y="88" width="12" height="20" fill="#4444aa"/>

  <!-- 体 -->
  <rect x="48" y="60" width="32" height="28" fill="#88ccff"/>

  <!-- 腕 -->
  <rect x="44" y="60" width="8" height="24" fill="#88ccff"/>
  <rect x="76" y="60" width="8" height="24" fill="#88ccff"/>

  <!-- 頭 -->
  <rect x="52" y="36" width="24" height="24" fill="#ffeebb"/>

  <!-- 髪（光沢感） -->
  <rect x="52" y="32" width="24" height="4" fill="#ffffff"/>

  <!-- 目（不気味さ・赤紫） -->
  <rect x="56" y="44" width="4" height="4" fill="#ff0000"/>
  <rect x="64" y="44" width="4" height="4" fill="#aa00ff"/>

  <!-- 口（小さく怪しい） -->
  <rect x="60" y="52" width="8" height="2" fill="#660000"/>

  <!-- 手にワックス瓶 -->
  <rect x="40" y="68" width="8" height="8" fill="#ffffaa"/>
  <rect x="76" y="68" width="8" height="8" fill="#ffffaa"/>

</svg>
