<svg width="384" height="256" viewBox="0 0 384 256"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 影 -->
  <rect x="160" y="224" width="64" height="16" fill="#1a2240" opacity="0.5"/>

  <!-- 頭（そろばん型） -->
  <rect x="168" y="64" width="48" height="32" fill="#996633"/>
  <!-- そろばんの珠（目として） -->
  <rect x="176" y="72" width="8" height="8" fill="#ffcc00"/>
  <rect x="200" y="72" width="8" height="8" fill="#ffcc00"/>

  <!-- 胴体（定規型） -->
  <rect x="160" y="96" width="64" height="80" fill="#ccff66"/>
  <!-- 目盛り模様 -->
  <rect x="160" y="96" width="64" height="4" fill="#999999"/>
  <rect x="160" y="104" width="64" height="4" fill="#999999"/>
  <rect x="160" y="112" width="64" height="4" fill="#999999"/>

  <!-- 腕（コンパスの針） -->
  <rect x="144" y="112" width="16" height="64" fill="#666666"/>
  <rect x="208" y="112" width="16" height="64" fill="#666666"/>
  <!-- 前腕に鉛筆装飾 -->
  <rect x="208" y="152" width="16" height="8" fill="#ff0000"/>

  <!-- 足（消しゴム型） -->
  <rect x="168" y="176" width="16" height="32" fill="#ff9999"/>
  <rect x="192" y="176" width="16" height="32" fill="#ff9999"/>

</svg>

