  <!-- テーブル -->
  <rect x="144" y="144" width="96" height="32" fill="#8b5a2b"/>

  <!-- 教師 -->
  <rect x="160" y="112" width="32" height="32" fill="#555555"/>
  <rect x="168" y="120" width="16" height="16" fill="#ffcc99"/> <!-- 顔 -->

  <!-- 生徒 -->
  <rect x="104" y="160" width="32" height="32" fill="#3366cc"/>
  <rect x="112" y="168" width="16" height="16" fill="#ffcc99"/> <!-- 顔 -->

  <!-- 保護者 -->
  <rect x="248" y="160" width="32" height="32" fill="#993333"/>
  <rect x="256" y="168" width="16" height="16" fill="#ffcc99"/> <!-- 顔 -->

  <!-- 緊張の雰囲気（赤い小アクセント） -->
  <rect x="192" y="128" width="4" height="4" fill="#cc0000"/>
  <rect x="184" y="120" width="4" height="4" fill="#cc0000"/>

</svg>

