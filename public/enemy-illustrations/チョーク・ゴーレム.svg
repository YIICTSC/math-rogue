  <!-- 腕 -->
  <rect x="20" y="60" width="16" height="28" fill="#e6e6e6"/>
  <rect x="92" y="60" width="16" height="28" fill="#e6e6e6"/>

  <!-- 頭 -->
  <rect x="44" y="32" width="40" height="28" fill="#f5f5f5"/>

  <!-- ひび割れ -->
  <rect x="56" y="40" width="4" height="12" fill="#bbbbbb"/>
  <rect x="72" y="64" width="4" height="16" fill="#bbbbbb"/>
  <rect x="48" y="72" width="12" height="4" fill="#bbbbbb"/>

