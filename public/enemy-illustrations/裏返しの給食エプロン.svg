  <rect x="68" y="50" width="4" height="4" fill="#aa00ff"/>

  <!-- 口（ギザギザで不気味） -->
  <rect x="58" y="68" width="12" height="2" fill="#660000"/>
  <rect x="58" y="68" width="2" height="2" fill="#ff5555"/>
  <rect x="64" y="68" width="2" height="2" fill="#ff5555"/>
  <rect x="70" y="68" width="2" height="2" fill="#ff5555"/>

  <!-- 肩紐 -->
  <rect x="50" y="44" width="4" height="12" fill="#ffffcc"/>
  <rect x="74" y="44" width="4" height="12" fill="#ffffcc"/>

</svg>
