<svg width="384" height="256" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">

  <!-- 足（ズボン・靴） -->
  <rect x="48" y="92" width="12" height="24" fill="#444455"/>
  <rect x="68" y="92" width="12" height="24" fill="#444455"/>
  <rect x="48" y="116" width="12" height="4" fill="#ffffff"/>
  <rect x="68" y="116" width="12" height="4" fill="#ffffff"/>

  <!-- 体（ジャージ上着・襟・ライン） -->
  <rect x="40" y="60" width="48" height="36" fill="#223366"/>
  <rect x="40" y="64" width="48" height="4" fill="#ffffff"/> <!-- 白ライン -->
  <rect x="40" y="60" width="4" height="36" fill="#111111"/>  <!-- 襟ライン -->

  <!-- 腕（指導ポーズ） -->
  <rect x="36" y="64" width="20" height="8" fill="#223366"/>
  <rect x="84" y="62" width="14" height="20" fill="#223366"/>

  <!-- 頭（少し大きめでリアル等身） -->
  <rect x="44" y="24" width="40" height="36" fill="#ffd8b0"/>

  <!-- 髪（濃グレー、運動感で乱れ） -->
  <rect x="44" y="20" width="40" height="8" fill="#444444"/>
  <rect x="48" y="16" width="32" height="4" fill="#555555"/>

  <!-- 目（細めで厳しめ） -->
  <rect x="54" y="36" width="8" height="2" fill="#111111"/>
  <rect x="66" y="36" width="8" height="2" fill="#111111"/>

  <!-- 口（真剣） -->
  <rect x="60" y="46" width="12" height="2" fill="#111111"/>

</svg>
