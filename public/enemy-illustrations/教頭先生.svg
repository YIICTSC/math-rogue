  <rect x="112" y="80" width="16" height="8" fill="#d0e4ff"/>
  <rect x="128" y="80" width="16" height="8" fill="#d0e4ff"/>

  <!-- 目 -->
  <rect x="116" y="84" width="4" height="4" fill="#333333"/>
  <rect x="136" y="84" width="4" height="4" fill="#333333"/>

  <!-- 体（スーツ） -->
