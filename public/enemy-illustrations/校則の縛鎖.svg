<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 8 8">
  <!-- 頭 -->
  <rect x="2" y="0" width="4" height="2" fill="#555"/>
  <!-- 目 -->
  <rect x="2" y="1" width="1" height="1" fill="#fff"/>
  <rect x="5" y="1" width="1" height="1" fill="#fff"/>
  <!-- 体（鎖のイメージ） -->
  <rect x="2" y="2" width="4" height="1" fill="#999"/>
  <rect x="2" y="3" width="4" height="1" fill="#555"/>
  <rect x="2" y="4" width="4" height="1" fill="#999"/>
  <rect x="2" y="5" width="4" height="1" fill="#555"/>
  <!-- 足 -->
  <rect x="2" y="6" width="1" height="2" fill="#333"/>
  <rect x="5" y="6" width="1" height="2" fill="#333"/>
</svg>
