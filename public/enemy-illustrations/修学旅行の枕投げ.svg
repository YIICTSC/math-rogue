<svg width="384" height="256" viewBox="0 0 384 256"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 床 -->
  <rect x="0" y="192" width="384" height="64" fill="#d2b48c"/>

  <!-- 布団 -->
  <rect x="64" y="160" width="128" height="32" fill="#ff9999"/>
  <rect x="192" y="160" width="128" height="32" fill="#99ccff"/>

  <!-- 生徒1 -->
  <rect x="80" y="128" width="32" height="32" fill="#3366cc"/>
  <rect x="88" y="136" width="16" height="16" fill="#ffcc99"/> <!-- 顔 -->

  <!-- 生徒2 -->
  <rect x="208" y="128" width="32" height="32" fill="#993333"/>
  <rect x="216" y="136" width="16" height="16" fill="#ffcc99"/> <!-- 顔 -->

  <!-- 飛んでる枕1 -->
  <rect x="160" y="112" width="24" height="16" fill="#ffffff"/>
  <rect x="168" y="104" width="16" height="8" fill="#eeeeff"/>

  <!-- 飛んでる枕2 -->
  <rect x="256" y="120" width="24" height="16" fill="#ffffff"/>
