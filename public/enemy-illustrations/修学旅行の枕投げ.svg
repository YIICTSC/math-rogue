  <!-- 動きのエフェクト（小ブロック） -->
  <rect x="176" y="96" width="4" height="4" fill="#ff6666"/>
  <rect x="240" y="88" width="4" height="4" fill="#ff6666"/>
  <rect x="200" y="104" width="4" height="4" fill="#ff6666"/>

</svg>
