  <!-- 学ラン上半身（黒に近いが埋もれない） -->
  <rect x="48" y="58" width="32" height="28" fill="#222833"/>

  <!-- ボタン -->
  <rect x="62" y="62" width="4" height="4" fill="#cccccc"/>
  <rect x="62" y="70" width="4" height="4" fill="#cccccc"/>

  <!-- 幽霊下部 -->
  <rect x="56" y="86" width="16" height="14" fill="#d9d9d9"/>

