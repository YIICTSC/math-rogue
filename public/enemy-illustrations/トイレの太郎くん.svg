  <!-- 顔（青白） -->
  <rect x="52" y="34" width="24" height="24" fill="#e6f2ff"/>

  <!-- 目（少し吊り目） -->
  <rect x="56" y="42" width="4" height="4" fill="#222222"/>
  <rect x="68" y="42" width="4" height="4" fill="#222222"/>

  <!-- 口（ニヤリ） -->
