<svg width="384" height="256" viewBox="0 0 384 256"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 影の体（濃グレーで黒背景でも見える） -->
  <rect x="176" y="96" width="32" height="64" fill="#333333"/>
  
  <!-- 頭 -->
  <rect x="176" y="80" width="32" height="16" fill="#555555"/>
  
  <!-- 目（赤く光る） -->
  <rect x="184" y="88" width="8" height="8" fill="#ff4444"/>
  <rect x="192" y="88" width="8" height="8" fill="#ff4444"/>
  
  <!-- ゆらめく影の揺れ -->
  <rect x="168" y="104" width="8" height="8" fill="#444444"/>
  <rect x="200" y="112" width="8" height="8" fill="#444444"/>
  <rect x="172" y="136" width="8" height="8" fill="#444444"/>
  <rect x="188" y="144" width="8" height="8" fill="#444444"/>

  <!-- 薄い不気味なオーラ（紫系で浮き上がる） -->
  <rect x="168" y="72" width="8" height="8" fill="#7755aa"/>
  <rect x="200" y="72" width="8" height="8" fill="#7755aa"/>
  <rect x="176" y="64" width="32" height="8" fill="#6666aa"/>

</svg>
