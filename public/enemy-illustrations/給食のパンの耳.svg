<svg width="256" height="256" viewBox="0 0 256 256"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 影（濃茶で黒を避ける） -->
  <rect x="88" y="196" width="80" height="16" fill="#2b1a0f" opacity="0.5"/>

  <!-- パン本体（白い部分） -->
  <rect x="80" y="72" width="96" height="96" fill="#f4e6c8"/>

  <!-- パンの耳（外枠） -->
  <rect x="72" y="64" width="112" height="16" fill="#b87333"/>
  <rect x="72" y="168" width="112" height="16" fill="#b87333"/>
  <rect x="72" y="80" width="16" height="88" fill="#b87333"/>
  <rect x="168" y="80" width="16" height="88" fill="#b87333"/>

  <!-- 焦げムラ -->
  <rect x="84" y="76" width="24" height="8" fill="#a9652a"/>
  <rect x="148" y="160" width="20" height="8" fill="#a9652a"/>

  <!-- 目 -->
  <rect x="104" y="112" width="16" height="16" fill="#5a2e1b"/>
  <rect x="136" y="112" width="16" height="16" fill="#5a2e1b"/>

  <!-- 目のハイライト -->
  <rect x="108" y="116" width="4" height="4" fill="#fff5e6"/>
  <rect x="140" y="116" width="4" height="4" fill="#fff5e6"/>

  <!-- 口 -->
  <rect x="112" y="144" width="32" height="8" fill="#7a3e20"/>

</svg>
