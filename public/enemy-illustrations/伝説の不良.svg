<svg width="384" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 足 -->
  <rect x="48" y="92" width="12" height="20" fill="#222222"/>
  <rect x="68" y="92" width="12" height="20" fill="#222222"/>

  <!-- 体（学ラン・襟立て） -->
  <rect x="40" y="60" width="48" height="36" fill="#111111"/>
  <rect x="36" y="60" width="8" height="20" fill="#111111"/> <!-- 襟立て左 -->
  <rect x="84" y="60" width="8" height="20" fill="#111111"/> <!-- 襟立て右 -->
  <rect x="40" y="64" width="48" height="4" fill="#880000"/> <!-- 腕組みライン -->

  <!-- 腕（腕組み） -->
  <rect x="36" y="64" width="56" height="8" fill="#111111"/>

  <!-- 頭 -->
  <rect x="44" y="28" width="40" height="32" fill="#ffd8b0"/>

  <!-- 髪（L字型リーゼント・金髪） -->
  <rect x="44" y="20" width="40" height="8" fill="#ffdd55"/> <!-- 上面 -->
  <rect x="44" y="20" width="8" height="16" fill="#ffcc33"/> <!-- 前に突き出す部分 -->
  <rect x="76" y="20" width="8" height="16" fill="#ffcc33"/> <!-- 左右の立体感 -->
  <rect x="46" y="16" width="36" height="4" fill="#ffee77"/> <!-- トップハイライト -->

  <!-- 目（鋭い） -->
  <rect x="54" y="36" width="8" height="2" fill="#111111"/>
  <rect x="66" y="36" width="8" height="2" fill="#111111"/>

  <!-- 口（ニヤリ口） -->
  <rect x="60" y="50" width="12" height="2" fill="#111111"/>
  <rect x="70" y="48" width="2" height="2" fill="#111111"/>

</svg>
