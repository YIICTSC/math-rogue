<svg width="384" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 傘の骨組み -->
  <rect x="62" y="40" width="4" height="24" fill="#333333"/> <!-- 中心の棒 -->
  <rect x="60" y="40" width="8" height="2" fill="#555555"/>  <!-- 上端横棒 -->

  <!-- 骨の先端 -->
  <rect x="56" y="36" width="4" height="4" fill="#444444"/>
  <rect x="68" y="36" width="4" height="4" fill="#444444"/>
  <rect x="52" y="32" width="4" height="4" fill="#555555"/>
  <rect x="72" y="32" width="4" height="4" fill="#555555"/>

  <!-- 傘の布（破れ・歪み） -->
  <rect x="52" y="44" width="24" height="8" fill="#3366ff"/>
  <rect x="54" y="46" width="20" height="4" fill="#2244cc"/>
  <rect x="56" y="48" width="16" height="2" fill="#112299"/>

  <!-- 目っぽく不気味に -->
  <rect x="60" y="42" width="4" height="2" fill="#ff0000"/>
  <rect x="64" y="42" width="4" height="2" fill="#ff0000"/>

  <!-- 下端の柄 -->
  <rect x="62" y="64" width="4" height="12" fill="#885522"/>

</svg>
