<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 額縁（濃い木枠） -->
  <rect x="36" y="20" width="56" height="72" fill="#5a3b1f"/>
  <rect x="40" y="24" width="48" height="64" fill="#7a5230"/>

  <!-- 背景（暗め） -->
  <rect x="44" y="28" width="40" height="56" fill="#2a3442"/>

  <!-- 人物シルエット -->
  <rect x="56" y="40" width="16" height="24" fill="#1f2a38"/>
  <rect x="60" y="34" width="8" height="8" fill="#1f2a38"/>

  <!-- 目（発光） -->
  <rect x="60" y="42" width="3" height="3" fill="#e6f2ff"/>
  <rect x="65" y="42" width="3" height="3" fill="#e6f2ff"/>

  <!-- 背景の歪み表現 -->
  <rect x="44" y="60" width="40" height="4" fill="#33465a"/>
  <rect x="50" y="72" width="20" height="4" fill="#33465a"/>

</svg>

