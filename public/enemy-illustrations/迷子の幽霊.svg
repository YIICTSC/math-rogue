  <rect x="58" y="68" width="4" height="4" fill="#dddddd"/>
  <rect x="62" y="68" width="4" height="4" fill="#dddddd"/>
  <rect x="66" y="68" width="4" height="4" fill="#dddddd"/>
  <rect x="70" y="68" width="4" height="4" fill="#dddddd"/>

