<svg width="384" height="256" viewBox="0 0 384 256"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 影 -->
  <rect x="160" y="224" width="64" height="16" fill="#1a2240" opacity="0.5"/>

  <!-- 頭 -->
  <rect x="176" y="80" width="32" height="32" fill="#660066"/>
  <!-- 目 -->
  <rect x="184" y="88" width="8" height="8" fill="#ff0000"/>
  <rect x="200" y="88" width="8" height="8" fill="#ff0000"/>
  <!-- 口 -->
  <rect x="184" y="104" width="24" height="8" fill="#cc0000"/>

  <!-- 胴体（ノート風） -->
  <rect x="160" y="112" width="64" height="64" fill="#9999ff"/>
  <!-- 線の模様（ノートの罫線） -->
  <rect x="160" y="120" width="64" height="4" fill="#6666cc"/>
  <rect x="160" y="128" width="64" height="4" fill="#6666cc"/>
  <rect x="160" y="136" width="64" height="4" fill="#6666cc"/>

  <!-- 腕（鉛筆の触手） -->
  <rect x="144" y="128" width="16" height="48" fill="#ffcc00"/>
  <rect x="224" y="128" width="16" height="48" fill="#ffcc00"/>
  <!-- 芯 -->
  <rect x="144" y="128" width="16" height="4" fill="#000000"/>
  <rect x="224" y="128" width="16" height="4" fill="#000000"/>

  <!-- 足（紙の束風） -->
  <rect x="176" y="176" width="16" height="32" fill="#ffffff"/>
  <rect x="192" y="176" width="16" height="32" fill="#ffffff"/>

</svg>
