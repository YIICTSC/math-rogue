<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 鉛筆本体（短い） -->
  <rect x="52" y="40" width="24" height="48" fill="#ffcc33"/>

  <!-- 木の部分 -->
