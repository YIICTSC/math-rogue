<svg width="384" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 体（幽霊っぽい白色） -->
  <rect x="50" y="44" width="28" height="44" fill="#eeeeee"/>
  
  <!-- ふわふわ感（下端がフリンジ状） -->
  <rect x="50" y="88" width="4" height="4" fill="#dddddd"/>
  <rect x="54" y="88" width="4" height="4" fill="#dddddd"/>
  <rect x="58" y="88" width="4" height="4" fill="#dddddd"/>
  <rect x="62" y="88" width="4" height="4" fill="#dddddd"/>
  <rect x="66" y="88" width="4" height="4" fill="#dddddd"/>
  <rect x="70" y="88" width="4" height="4" fill="#dddddd"/>
  <rect x="74" y="88" width="4" height="4" fill="#dddddd"/>

  <!-- 頭 -->
  <rect x="52" y="28" width="24" height="16" fill="#eeeeee"/>
  
  <!-- 目（不気味な赤紫目） -->
  <rect x="58" y="32" width="4" height="4" fill="#ff33aa"/>
  <rect x="66" y="32" width="4" height="4" fill="#aa00ff"/>

  <!-- 口（小さく不気味に） -->
  <rect x="60" y="42" width="8" height="2" fill="#660000"/>

  <!-- 浮遊感・影 -->
  <rect x="52" y="92" width="24" height="2" fill="#111111" opacity="0.3"/>

</svg>
