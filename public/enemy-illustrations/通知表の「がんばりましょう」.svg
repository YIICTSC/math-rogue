<svg width="384" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 紙本体 -->
  <rect x="48" y="40" width="32" height="56" fill="#ffffff"/>
  
  <!-- 折れ角 -->
  <rect x="76" y="40" width="4" height="8" fill="#cccccc"/>
  
  <!-- 目（赤く光る目） -->
  <rect x="52" y="50" width="6" height="4" fill="#ff2222"/>
  <rect x="70" y="50" width="6" height="4" fill="#ff2222"/>
  
  <!-- 口（ニヤリ口） -->
  <rect x="56" y="70" width="16" height="4" fill="#660000"/>
  <rect x="56" y="70" width="4" height="2" fill="#990000"/>
  <rect x="68" y="70" width="4" height="2" fill="#990000"/>
  
  <!-- がんばりましょう文字ブロック（象徴） -->
  <rect x="52" y="88" width="24" height="4" fill="#0000ff"/>
  
  <!-- 影・浮遊感 -->
  <rect x="50" y="96" width="28" height="2" fill="#111111" opacity="0.5"/>

</svg>
