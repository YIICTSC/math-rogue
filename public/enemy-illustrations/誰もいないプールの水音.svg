<svg width="384" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 水面のベース -->
  <rect x="32" y="64" width="64" height="32" fill="#0055aa"/>
  
  <!-- 波紋（白・水色ブロックで水音の動き） -->
  <rect x="40" y="70" width="8" height="2" fill="#88ccff"/>
  <rect x="80" y="80" width="6" height="2" fill="#88ccff"/>
  <rect x="60" y="78" width="4" height="2" fill="#aaddff"/>
  
  <!-- 水滴（跳ねるイメージ） -->
  <rect x="50" y="60" width="2" height="4" fill="#aaddff"/>
  <rect x="70" y="58" width="2" height="4" fill="#aaddff"/>
  <rect x="75" y="64" width="2" height="2" fill="#ffffff"/>
  
  <!-- 反射の光 -->
  <rect x="56" y="68" width="16" height="2" fill="#ffffff"/>
  <rect x="48" y="74" width="32" height="2" fill="#bbddff"/>

</svg>

