<svg width="384" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 筆箱本体（青系） -->
  <rect x="40" y="60" width="48" height="24" fill="#3366ff"/>
  
  <!-- 蓋（口っぽく） -->
  <rect x="40" y="56" width="48" height="4" fill="#2233aa"/>
  <rect x="40" y="56" width="4" height="8" fill="#112277"/> <!-- 左端の鋭さ -->
  <rect x="84" y="56" width="4" height="8" fill="#112277"/> <!-- 右端の鋭さ -->

  <!-- 目（赤・不気味） -->
  <rect x="52" y="62" width="6" height="4" fill="#ff2222"/>
  <rect x="70" y="62" width="6" height="4" fill="#ff2222"/>
  
  <!-- 口（ギザギザ） -->
  <rect x="50" y="74" width="28" height="4" fill="#660000"/>
  <rect x="50" y="74" width="4" height="2" fill="#990000"/>
  <rect x="58" y="74" width="4" height="2" fill="#990000"/>
  <rect x="66" y="74" width="4" height="2" fill="#990000"/>
  <rect x="74" y="74" width="4" height="2" fill="#990000"/>

  <!-- 浮遊感・影 -->
  <rect x="44" y="88" width="36" height="2" fill="#111111" opacity="0.5"/>

  <!-- ファスナー装飾 -->
  <rect x="56" y="56" width="16" height="2" fill="#ffdd33"/>
  
</svg>
