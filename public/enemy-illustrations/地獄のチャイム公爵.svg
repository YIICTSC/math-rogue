<svg width="384" height="256" viewBox="0 0 128 128"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 足 -->
  <rect x="50" y="92" width="12" height="18" fill="#330000"/>
  <rect x="66" y="92" width="12" height="18" fill="#330000"/>

  <!-- 体（地獄の赤紫マント） -->
  <rect x="42" y="60" width="44" height="32" fill="#660066"/>

  <!-- 腕（マントに包まれた片手を上げる） -->
  <rect x="36" y="64" width="14" height="8" fill="#660066"/>
  <rect x="84" y="62" width="14" height="20" fill="#660066"/>

  <!-- 頭（チャイムの冠付き） -->
  <rect x="44" y="28" width="40" height="32" fill="#ffcc99"/>
  <rect x="46" y="20" width="36" height="8" fill="#999900"/> <!-- チャイム冠 -->
  <rect x="50" y="16" width="28" height="4" fill="#ffdd33"/> <!-- チャイム装飾 -->

  <!-- 目（赤く光る） -->
  <rect x="54" y="36" width="8" height="4" fill="#ff2222"/>
  <rect x="66" y="36" width="8" height="4" fill="#ff2222"/>

  <!-- 口（ニヤリ口） -->
  <rect x="60" y="46" width="12" height="2" fill="#660000"/>
  <rect x="60" y="46" width="2" height="2" fill="#990000"/>
  <rect x="70" y="46" width="2" height="2" fill="#990000"/>

  <!-- 炎のアクセント（周囲の小さい炎） -->
  <rect x="36" y="56" width="4" height="4" fill="#ff6600"/>
  <rect x="88" y="56" width="4" height="4" fill="#ff6600"/>
  <rect x="50" y="100" width="12" height="4" fill="#ff4400"/>

</svg>
