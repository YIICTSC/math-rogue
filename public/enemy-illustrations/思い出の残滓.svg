<svg width="384" height="256" viewBox="0 0 384 256"
     xmlns="http://www.w3.org/2000/svg"
     shape-rendering="crispEdges">

  <!-- 背景 -->
  <rect x="0" y="0" width="384" height="256" fill="#1a1a1a"/>

  <!-- 思い出の残滓の粒 -->
  <rect x="64" y="64" width="8" height="8" fill="#88ccff"/>
  <rect x="80" y="72" width="4" height="4" fill="#aaccee"/>
  <rect x="120" y="96" width="6" height="6" fill="#99bbff"/>
  <rect x="200" y="120" width="10" height="10" fill="#ccddee"/>
  <rect x="160" y="80" width="8" height="8" fill="#aabbff"/>
  <rect x="280" y="160" width="12" height="12" fill="#99ccff"/>
  <rect x="320" y="200" width="6" height="6" fill="#aaccee"/>

  <!-- 少し大きめの残滓（中心に淡く漂う） -->
  <rect x="176" y="128" width="16" height="16" fill="#bbddff" opacity="0.6"/>
  <rect x="192" y="144" width="12" height="12" fill="#ccddee" opacity="0.5"/>

</svg>
